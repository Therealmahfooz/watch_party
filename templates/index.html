<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaathScreen — Watch Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0E13;
    --surface: #19171F;
    --surface-2: #221F29;
    --amber: #E8A33D;
    --amber-dim: #6b5330;
    --violet: #7A6B9E;
    --text: #F2EFE9;
    --muted: #9A94A6;
    --line: #2C2933;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(232,163,61,0.06), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(122,107,158,0.08), transparent 45%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
  }

  .brand {
    text-align: center;
    margin-bottom: 28px;
  }

  .brand .projector {
    font-size: 34px;
    display: inline-block;
    margin-bottom: 6px;
    filter: drop-shadow(0 0 14px rgba(232,163,61,0.35));
  }

  .brand h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    margin: 0;
    color: var(--text);
  }

  .brand h1 span { color: var(--amber); }

  .brand p {
    color: var(--muted);
    font-size: 14px;
    margin: 6px 0 0;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
  }

  .tabs {
    display: flex;
    background: var(--surface-2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    user-select: none;
  }

  .tab.active {
    background: var(--amber);
    color: #1a1509;
  }

  label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--amber);
  }

  input.code-input {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  button.go {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: var(--amber);
    color: #1a1509;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  button.go:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(232,163,61,0.25);
  }

  .error {
    background: rgba(220,80,80,0.12);
    border: 1px solid rgba(220,80,80,0.35);
    color: #e88;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
  }

  .foot {
    text-align: center;
    margin-top: 18px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="projector">🎬</div>
      <h1>Saath<span>Screen</span></h1>
      <p>ek link paste karo, saath mein dekho — chahe kitni bhi door ho</p>
    </div>

    <div class="card">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <div class="tabs">
        <div class="tab active" data-panel="create">Room Banao</div>
        <div class="tab" data-panel="join">Room Join Karo</div>
      </div>

      <div class="panel active" id="panel-create">
        <form action="/create" method="POST">
          <label>Tumhara naam</label>
          <input type="text" name="name" placeholder="e.g. Rohan" required>
          <button class="go" type="submit">Naya Room Banao →</button>
        </form>
      </div>

      <div class="panel" id="panel-join">
        <form action="/join" method="POST">
          <label>Tumhara naam</label>
          <input type="text" name="name" placeholder="e.g. Priya" required>
          <label>Room code</label>
          <input class="code-input" type="text" name="code" maxlength="6" placeholder="ABC123" required>
          <button class="go" type="submit">Room Join Karo →</button>
        </form>
      </div>
    </div>

    <div class="foot">
      Room banane ke baad code apne dost ko WhatsApp pe bhej do.<br>
      Video ke liye YouTube link (best), ya Google Drive share link use karo.
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });
  </script>
</body>
</html>
